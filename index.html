<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaraBasa AI - Login</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">📚 TaraBasa AI</div>
      <div class="tagline">🌟 Complete AI-Powered Learning Platform 🌟</div>
    </div>

    <div class="screen active">
      <h2>Welcome to TaraBasa AI 🔐</h2>
      <div class="auth-box">
        <div class="auth-tabs">
          <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">Login</button>
          <button class="auth-tab" id="tab-signup" onclick="switchAuthTab('signup')">Sign Up</button>
        </div>

        <form id="login-form" class="auth-form active" onsubmit="handleLogin(event)">
          <label>Email</label>
          <input class="auth-input" id="login-email" type="email" required placeholder="you@example.com">
          <label>Password</label>
          <input class="auth-input" id="login-password" type="password" required placeholder="Enter password">
          <button class="btn btn-primary" type="submit" style="width:100%;">Login</button>
          <button class="back-btn" type="button" style="width:100%; margin-top:8px;" onclick="handleForgotPassword()">
            Forgot Password
          </button>
        </form>

        <form id="signup-form" class="auth-form" onsubmit="handleSignup(event)">
          <label>Full Name</label>
          <input class="auth-input" id="signup-name" type="text" required placeholder="Your name">
          <label>Email</label>
          <input class="auth-input" id="signup-email" type="email" required placeholder="you@example.com">
          <label>Password</label>
          <input class="auth-input" id="signup-password" type="password" minlength="6" required placeholder="Minimum 6 characters">
          <label>Role</label>
          <select class="auth-select" id="signup-role" required>
            <option value="">Select role...</option>
            <option value="teacher">Teacher</option>
            <option value="student">Student</option>
            <option value="parent">Parent</option>
          </select>
          <button class="btn btn-success" type="submit" style="width:100%;">Create Account</button>
        </form>
      </div>
    </div>
  </div>

  <script src="js/app-data.js"></script>
  <script src="js/features/auth-ui.js"></script>
  <script src="js/features/auth-actions.js"></script>
  <script src="js/features/auth-init.js"></script>
</body>
</html>
